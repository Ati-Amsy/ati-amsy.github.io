<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VJ1000 codes</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --primary-color: #00ACC1;
            --secondary-color: #f0f2f5;
            --error-color: #d32f2f;
            --bg-card: #ffffff;
            --bg-today: #e0f7fa;
            --border-today: #b2ebf2;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background-color: var(--secondary-color);
            margin: 0;
            padding: 15px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 450px;
            margin: auto;
            position: relative;
        }

        header {
            margin-bottom: 15px;
            position: relative;
        }

        h1 {
            color: var(--primary-color);
            font-size: 22px;
            margin: 0 0 5px 0;
        }

        .author {
            font-size: 10px;
            color: #aaa;
            text-align: left;
            display: block;
        }

        .today-box {
            background: var(--bg-today);
            border-radius: 18px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid var(--border-today);
        }

        .today-date {
            font-size: 18px;
            font-weight: bold;
            color: #006064;
        }

        .today-pwd {
            font-size: 56px;
            font-weight: bold;
            color: var(--error-color);
            margin: 5px 0;
            letter-spacing: 4px;
        }

        input, textarea {
            font-size: 16px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--primary-color);
            width: 90%;
            margin: 10px 0;
            outline: none;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            box-shadow: 0 0 0 2px rgba(0, 172, 193, 0.3);
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn:hover, .btn:focus {
            background: #008b9a;
        }

        #admin-panel {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #eee;
            text-align: left;
        }

        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--secondary-color);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .lang-switcher {
            position: absolute;
            top: 0;
            right: 0;
            font-size: 12px;
            font-weight: bold;
            color: var(--primary-color);
            cursor: pointer;
            border: 1px solid var(--primary-color);
            padding: 4px 10px;
            border-radius: 12px;
            background: white;
            z-index: 10;
        }

        .lang-switcher:focus {
            outline: 2px solid var(--primary-color);
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        #save-status {
            font-size: 11px;
            margin-top: 5px;
            min-height: 1.2em;
        }
    </style>
</head>
<body>

<div id="login-overlay" role="dialog" aria-labelledby="ui-login-title">
    <div class="login-card">
        <header>
            <h2 id="ui-login-title">Belépés</h2>
        </header>
        <form onsubmit="event.preventDefault(); login();">
            <label for="app-password" class="visually-hidden">Belépési jelszó</label>
            <input type="password" id="app-password" placeholder="Jelszó..." autocomplete="current-password">
            <button type="submit" class="btn" id="ui-login-btn">BELÉPÉS</button>
        </form>
        <p id="login-error" style="color:var(--error-color); font-size:11px; display:none; margin-top:10px;" role="alert">Hibás jelszó!</p>

        <!-- KEZDETI SETUP -->
        <div id="setup-trigger" style="display:none; margin-top:20px;">
            <button onclick="document.getElementById('setup-panel').style.display='block'; this.style.display='none'"
                    style="font-size:10px; background:none; border:none; color:#bbb; cursor:pointer;"
                    aria-label="Kezdeti beállítás megnyitása">KEZDETI BEÁLLÍTÁS (ADMIN)</button>
        </div>
        <div id="setup-panel" style="display:none; font-size:10px; text-align:left; border-top:1px dashed #ccc; margin-top:10px; padding-top:10px;">
            <form onsubmit="event.preventDefault(); generateSecureConfigs();">
                <label for="s-token">GitHub Token</label>
                <input type="text" id="s-token" placeholder="GitHub Token">

                <label for="s-gist">Gist ID</label>
                <input type="text" id="s-gist" placeholder="Gist ID">

                <label for="s-file">Fájlnév</label>
                <input type="text" id="s-file" placeholder="Filename (napi.txt)" value="napi.txt">

                <label for="s-ekey">Gist Titkosító Kulcs</label>
                <input type="text" id="s-ekey" placeholder="Gist Titkosító Kulcs (pl: Titkos123)">

                <label for="s-apass">Admin Belépő Jelszó</label>
                <input type="text" id="s-apass" placeholder="Admin Belépő Jelszó">

                <label for="s-upass">User Belépő Jelszó</label>
                <input type="text" id="s-upass" placeholder="User Belépő Jelszó">

                <button type="submit" class="btn" style="padding:10px; font-size:10px;" aria-label="Biztonságos kódok generálása">BIZTONSÁGOS KÓDOK GENERÁLÁSA</button>
            </form>
            <label for="s-out" class="visually-hidden">Kimeneti konfiguráció</label>
            <textarea id="s-out" style="width:100%; height:80px; font-size:9px; margin-top:10px;" readonly placeholder="A kapott kódokat másold a script megfelelő részébe..."></textarea>
        </div>
    </div>
</div>

<main class="card">
    <header>
        <button class="lang-switcher" onclick="toggleLang()" id="lang-btn" aria-label="Nyelv váltása">EN</button>
        <h1 id="ui-title">VJ1000 napi jelszó</h1>
        <span id="ui-author" class="author">v4.0 - Attila Gál</span>
    </header>

    <article id="user-view">
        <div class="today-box" aria-live="polite">
            <div id="today-date" class="today-date">----. --. --.</div>
            <div id="today-pwd" class="today-pwd">---</div>
        </div>

        <section style="font-size:11px; color:#888;">
            <label id="ui-search-label" for="date-picker">Keresés:</label>
            <input type="date" id="date-picker" onchange="updateDisplay()" aria-label="Dátumválasztó">
            <div id="picked-pwd" style="font-size:24px; font-weight:bold; color:#444; margin-top:5px;" aria-live="polite">---</div>
        </section>

        <button class="btn" onclick="fetchData()" id="ui-refresh-btn" style="margin-top:20px;">FRISSÍTÉS</button>
    </article>

    <!-- ADMIN PANEL -->
    <section id="admin-panel" aria-labelledby="ui-admin-title">
        <header>
            <h3 id="ui-admin-title" style="color:var(--error-color); margin-top:0;">Adminisztráció</h3>
            <p id="ui-admin-msg" style="font-size:11px;">Jelszavak szerkesztése (DD/MM/YYYY formátum):</p>
        </header>
        <label for="edit-area" class="visually-hidden">Jelszavak szerkesztése</label>
        <textarea id="edit-area" style="height: 200px; font-family: monospace; font-size: 12px;"></textarea>
        <button class="btn" id="save-btn" onclick="saveToGist()" style="background:#455a64;">MENTÉS A GIST-RE</button>
        <p id="save-status" role="status"></p>
    </section>
</main>

<script>
    // --- TITKOSÍTOTT KONFIGURÁCIÓK (IDE MÁSOLD A GENERÁLT KÓDOKAT) ---
    const CONFIG_A = 'U2FsdGVkX1882Lwh65pT+E9ZgeDzUwmsH879FNlBaCPIwAN/ZYnIwoehrDTcdLbaRqKTGQgVkYC7CQOlBIA5ZUTBiikl3VSp9KHL19+B0q7AvyQjg41CD57eAUkoXZRfstpNBtHegfQ+4ukw8GGRthOCy/7ilPVrU8wLX0hNhhbeA0h2SaOWg+QOFC7NTJZTwazY+v8o/yA9TG8eDqWgQJ3or6WGwdXQ3MIouKwj+Sqq8keQiD7TwafYshjDa7vZ29r+ULxP0Mx5W8UYyGz/xsqdK52AaOGzT0BWyWwT6JU=';
    const CONFIG_U = 'U2FsdGVkX1/J3j0DSqwF2lcx0mX3dnLJuBKutI0A19o3i1rXMn69klOwfmqvX0KHc4BF4es+5U1A1aLcp22y2e+gO8DHqLOx32b0lyYqdsIR6fw6vUYE4Xc6QEUB1uTJ4wfjqkLVIjNLv9qE8M/O84R14zQfpuUo06QBNzc+nXE=';
    // ---------------------------------------------------------------

    let activeConfig = null;
    let isAdmin = false;

    const langData = {
        hu: { btn: "EN", loginTitle: "Belépés", loginBtn: "BELÉPÉS", title: "VJ1000 napi jelszó", author: "v4.0 - Gál Attila", searchLabel: "Keresés:", refreshBtn: "FRISSÍTÉS", adminTitle: "Adminisztráció", adminMsg: "Jelszavak szerkesztése (DD/MM/YYYY formátum):", saveBtn: "MENTÉS A GIST-RE", syncing: "Szinkronizálás..." },
        en: { btn: "HU", loginTitle: "Login", loginBtn: "LOGIN", title: "VJ1000 daily codes", author: "v4.0 - by Attila Gal", searchLabel: "Search:", refreshBtn: "REFRESH", adminTitle: "Administration", adminMsg: "Edit passwords (DD/MM/YYYY format):", saveBtn: "SAVE TO GIST", syncing: "Syncing..." }
    };

    let currentLang = localStorage.getItem('vj_lang') || 'hu';

    function applyLanguage() {
        const d = langData[currentLang];
        document.documentElement.lang = currentLang;
        document.getElementById('lang-btn').innerText = d.btn;
        document.getElementById('ui-login-title').innerText = d.loginTitle;
        document.getElementById('ui-login-btn').innerText = d.loginBtn;
        document.getElementById('ui-title').innerText = d.title;
        document.getElementById('ui-author').innerText = d.author;
        document.getElementById('ui-search-label').innerText = d.searchLabel;
        document.getElementById('ui-refresh-btn').innerText = d.refreshBtn;
        document.getElementById('ui-admin-title').innerText = d.adminTitle;
        document.getElementById('ui-admin-msg').innerText = d.adminMsg;
        document.getElementById('save-btn').innerText = d.saveBtn;
        updateDisplay();
    }

    function toggleLang() {
        currentLang = currentLang === 'hu' ? 'en' : 'hu';
        localStorage.setItem('vj_lang', currentLang);
        applyLanguage();
    }

    function login() {
        const pass = document.getElementById('app-password').value;
        if (!CONFIG_A) { alert("Nincs konfiguráció!"); return; }

        let success = false;

        try {
            const decrypted = CryptoJS.AES.decrypt(CONFIG_A, pass).toString(CryptoJS.enc.Utf8);
            if (decrypted && decrypted.startsWith('{')) {
                activeConfig = JSON.parse(decrypted);
                isAdmin = true;
                success = true;
            }
        } catch(e) {}

        if (!success) {
            try {
                const decrypted = CryptoJS.AES.decrypt(CONFIG_U, pass).toString(CryptoJS.enc.Utf8);
                if (decrypted && decrypted.startsWith('{')) {
                    activeConfig = JSON.parse(decrypted);
                    isAdmin = false;
                    success = true;
                }
            } catch(e) {}
        }

        if (success) {
            localStorage.setItem('vj_pass_cache', pass);
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-panel').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('login-error').style.display = 'none';
            fetchData();
            applyLanguage();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    async function fetchData() {
        if (!activeConfig) return;
        try {
            const headers = activeConfig.token ? { 'Authorization': `token ${activeConfig.token}` } : {};
            const res = await fetch(`https://api.github.com/gists/${activeConfig.gistId}?t=${Date.now()}`, { headers });
            const data = await res.json();
            const encrypted = data.files[activeConfig.filename].content;
            const bytes = CryptoJS.AES.decrypt(encrypted, activeConfig.encryptKey);
            const plain = bytes.toString(CryptoJS.enc.Utf8);

            if (plain) {
                localStorage.setItem('vj_plain_data', plain);
                if(isAdmin) document.getElementById('edit-area').value = plain;
                updateDisplay();
            }
        } catch (e) { console.error("Sync error:", e); }
    }

    async function saveToGist() {
        if (!isAdmin || !activeConfig.token) return;
        const btn = document.getElementById('save-btn');
        const status = document.getElementById('save-status');
        const inputArea = document.getElementById('edit-area');
        const newRawContent = inputArea.value;

        btn.disabled = true;
        status.innerText = langData[currentLang].syncing;

        let pwdMap = {};
        const plain = localStorage.getItem('vj_plain_data') || "";
        const matches = plain.matchAll(/(\d{2}\/\d{2}\/\d{4}):\s*(\d{6})/g);
        for (const match of matches) pwdMap[match[1]] = match[2];

        if (newRawContent.includes("Your temporary password")) {
            const dMatches = newRawContent.matchAll(/(\d{2}\/\d{2}\/\d{4})/g);
            const pMatches = newRawContent.matchAll(/(\d{6})/g);
            const dates = Array.from(dMatches).map(m => m[0]);
            const pwds = Array.from(pMatches).map(m => m[0]);
            dates.forEach((date, i) => { if (pwds[i]) pwdMap[date] = pwds[i]; });
        } else {
            const m = newRawContent.matchAll(/(\d{2}\/\d{2}\/\d{4}):\s*(\d{6})/g);
            for (const match of m) pwdMap[match[1]] = match[2];
        }

        const years = [...new Set(Object.keys(pwdMap).map(d => d.split('/')[2]))].sort().reverse();
        let finalContent = "";
        years.forEach(year => {
            finalContent += `=== ${year} ===\n\n`;
            for (let day = 1; day <= 31; day++) {
                const dayStr = day.toString().padStart(2, '0');
                let row = "| "; let hasData = false;
                for (let month = 1; month <= 12; month++) {
                    const monthStr = month.toString().padStart(2, '0');
                    const dateKey = `${dayStr}/${monthStr}/${year}`;
                    if (pwdMap[dateKey]) { row += `${dateKey}: ${pwdMap[dateKey]} | `; hasData = true; }
                    else { row += " ".repeat(21); }
                }
                if (hasData) finalContent += row.trimEnd() + "\n";
            }
            finalContent += "\n\n";
        });

        const encrypted = CryptoJS.AES.encrypt(finalContent.trim(), activeConfig.encryptKey).toString();
        try {
            const res = await fetch(`https://api.github.com/gists/${activeConfig.gistId}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${activeConfig.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ files: { [activeConfig.filename]: { content: encrypted } } })
            });
            if (res.ok) {
                status.style.color = "green"; status.innerText = "OK!";
                inputArea.value = finalContent;
                localStorage.setItem('vj_plain_data', finalContent);
                updateDisplay();
            }
        } catch (e) { status.style.color = "red"; status.innerText = "Error!"; }
        finally { btn.disabled = false; }
    }

    function updateDisplay() {
        const plain = localStorage.getItem('vj_plain_data');
        if (!plain) return;
        const now = new Date();
        const todayStr = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
        document.getElementById('today-date').innerText = now.toLocaleDateString(currentLang === 'hu' ? 'hu-HU' : 'en-US');
        document.getElementById('today-pwd').innerText = extractPwd(plain, todayStr) || "---";
        const picker = document.getElementById('date-picker').value;
        if (picker) {
            const p = picker.split('-');
            document.getElementById('picked-pwd').innerText = extractPwd(plain, `${p[2]}/${p[1]}/${p[0]}`) || "---";
        }
    }

    function extractPwd(content, date) {
        let idx = content.indexOf(date);
        if (idx === -1) {
            const p = date.split("/");
            idx = content.indexOf(`${p[1]}/${p[0]}/${p[2]}`);
        }
        if (idx === -1) return null;
        const m = content.substring(idx + 10, idx + 115).match(/(\d{6})/);
        return m ? m[0] : null;
    }

    function generateSecureConfigs() {
        const token = document.getElementById('s-token').value;
        const gistId = document.getElementById('s-gist').value;
        const filename = document.getElementById('s-file').value;
        const ekey = document.getElementById('s-ekey').value;
        const apass = document.getElementById('s-apass').value;
        const upass = document.getElementById('s-upass').value;

        const aConf = JSON.stringify({ token, gistId, filename, encryptKey: ekey });
        const uConf = JSON.stringify({ gistId, filename, encryptKey: ekey });

        const lockedA = CryptoJS.AES.encrypt(aConf, apass).toString();
        const lockedU = CryptoJS.AES.encrypt(uConf, upass).toString();

        document.getElementById('s-out').value = `const CONFIG_A = '${lockedA}';\nconst CONFIG_U = '${lockedU}';`;
    }

    window.onload = () => {
        applyLanguage();
        if (!CONFIG_A) document.getElementById('setup-trigger').style.display = 'block';
        const cached = localStorage.getItem('vj_pass_cache');
        if (cached) { document.getElementById('app-password').value = cached; login(); }
    };
</script>
</body>
</html>
